<div id="pill">1x</div>
<div id="bar">
  <button id="slower" title="Slower">&minus;</button>
  <span id="spd" title="Click to enter custom speed" style="cursor:pointer">1x</span>
  <button id="faster" title="Faster">+</button>
  <span class="sep"></span>
  <button id="back" title="Back">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="11 19 2 12 11 5"/><polygon points="22 19 13 12 22 5"/></svg>
  </button>
  <button id="fwd" title="Forward">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="2 5 11 12 2 19"/><polygon points="13 5 22 12 13 19"/></svg>
  </button>
  <button id="mute" title="Toggle mute">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none"/>
      <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
      <path d="M19 5a10 10 0 0 1 0 14"/>
      <line class="mute-slash" x1="22" y1="2" x2="2" y2="22"/>
    </svg>
  </button>
  <button id="loop" title="Toggle loop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
      <path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>
    </svg>
  </button>
  <button id="solo" title="Mute every other video on this page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <span class="sep"></span>
  <button id="pip" title="Picture-in-picture">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><rect x="14" y="11" width="7" height="5" rx="1"/>
    </svg>
  </button>
  <button id="fullscreen" title="Fullscreen (great for Reels/Shorts-style players with no native fullscreen)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
    </svg>
  </button>
  <button id="rotateLeft" title="Rotate video 90° left">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
    </svg>
  </button>
  <button id="rotateRight" title="Rotate video 90° right">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
    </svg>
  </button>
  <button id="cinema" title="Cinema mode — dim the page around the video">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <span class="sep"></span>
  <button id="vol" title="Volume boost">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span id="volLabel">100%</span>
  </button>
  <button id="normalize" title="Loudness normalization — evens out quiet/loud parts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
      <line x1="4" y1="7" x2="4" y2="17"/><line x1="12" y1="7" x2="12" y2="17"/><line x1="20" y1="7" x2="20" y2="17"/>
    </svg>
  </button>
  <button id="cc" title="Cycle caption tracks">CC</button>
  <button id="shot" title="Screenshot frame (saves + copies to clipboard)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.2"/>
    </svg>
  </button>
  <button id="copyTs" title="Copy timestamped link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  </button>
  <button id="rec" title="Record playing video to .webm">
    <svg viewBox="0 0 24 24">
      <circle class="rec-dot" cx="12" cy="12" r="10" fill="currentColor"/>
      <rect class="rec-square" x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
    </svg>
    <span id="recLabel">Rec</span>
  </button>
  <button id="dl" title="Download (direct sources only)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
  <button id="netSpeed" title="Network Speed: Video Consumed vs Device Bandwidth">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/>
    </svg>
    <span id="netSpeedLabel">0 B/s</span>
  </button>
  <span class="sep"></span>
  <button id="pin" title="Pin overlay position">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="17" x2="12" y2="22"/>
      <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
    </svg>
  </button>
  <button id="collapseBtn" title="Collapse toolbar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
</div>
<div id="msg"></div>
<div id="flash"><span id="flashIcon"></span><span id="flashText"></span></div>
<div id="picker"></div>
