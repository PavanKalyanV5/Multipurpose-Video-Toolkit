<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Universal Video Toolkit — Custom Rules</title>
<link rel="stylesheet" href="vendor/codemirror/codemirror.css">
<link rel="stylesheet" href="vendor/codemirror/theme/material-darker.css">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0e111a;
    color: #e2e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  .app { display: grid; grid-template-columns: 270px 1fr; height: 100vh; }

  /* ── Sidebar ─────────────────────────────────────────────────────── */
  .sidebar {
    background: #10131d; border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; min-width: 0;
  }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 14px 10px;
  }
  .sidebar-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; }
  .sidebar-title .logo-icon { color: #38bdf8; filter: drop-shadow(0 0 6px rgba(56,189,248,.4)); }
  .new-rule-link {
    background: none; border: none; color: #38bdf8; font-size: 12px; font-weight: 700;
    cursor: pointer; padding: 4px 6px; border-radius: 5px; transition: background .15s ease;
  }
  .new-rule-link:hover { background: rgba(56,189,248,0.12); }

  .search-row { padding: 0 14px 10px; }
  .search-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px; padding: 7px 10px; font-size: 12px; color: #cbd5e1; outline: none;
    font-family: inherit;
  }
  .search-input:focus { border-color: rgba(56,189,248,0.4); }

  .rule-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .rule-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 8px; cursor: pointer;
    transition: background .15s ease; margin-bottom: 2px;
  }
  .rule-item:hover { background: rgba(255,255,255,0.04); }
  .rule-item.active { background: rgba(56,189,248,0.1); }
  .rule-item.disabled .rule-item-name, .rule-item.disabled .rule-item-pattern { opacity: .45; }
  .rule-item-main { flex: 1; min-width: 0; }
  .rule-item-name {
    font-size: 12.5px; font-weight: 600; color: #e2e8f0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rule-item-pattern {
    font-size: 10.5px; color: #64748b; margin-top: 1px; font-family: 'Consolas', 'SF Mono', monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .sidebar-empty { padding: 20px 16px; font-size: 11.5px; color: #64748b; text-align: center; line-height: 1.6; }

  /* Small toggle switch (list rows) */
  .switch.small { position: relative; display: inline-block; width: 32px; height: 18px; flex-shrink: 0; }
  .switch.small input { opacity: 0; width: 0; height: 0; }
  .switch.small .slider {
    position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.06);
    transition: .2s ease; border-radius: 20px;
  }
  .switch.small .slider:before {
    position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px;
    background: #94a3b8; transition: .2s ease; border-radius: 50%;
  }
  .switch.small input:checked + .slider { background: rgba(56,189,248,0.18); border-color: rgba(56,189,248,0.45); }
  .switch.small input:checked + .slider:before { transform: translateX(14px); background: #38bdf8; box-shadow: 0 0 6px rgba(56,189,248,.5); }

  /* ── Main area ───────────────────────────────────────────────────── */
  .main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.06);
    background: #10131d; flex-shrink: 0;
  }
  .field-group { display: flex; flex-direction: column; gap: 3px; }
  .field-group.name { width: 190px; }
  .field-group.pattern { flex: 1; }
  .field-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #64748b; }
  .field-input {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px; padding: 7px 10px; font-size: 12.5px; color: #e2e8f0; outline: none;
    font-family: inherit;
  }
  .field-input:focus { border-color: rgba(56,189,248,0.45); }
  .pattern-row { display: flex; align-items: center; gap: 8px; }
  .pattern-row .field-input { flex: 1; font-family: 'Consolas', 'SF Mono', monospace; font-size: 11.5px; }
  .pattern-check { flex-shrink: 0; color: #475569; transition: color .15s ease; }
  .pattern-check.valid { color: #22c55e; }

  .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
  .save-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
    color: #38bdf8; padding: 8px 16px; border-radius: 7px;
    font-size: 12.5px; font-weight: 700; cursor: pointer; transition: all .2s ease;
  }
  .save-btn:hover { background: rgba(56,189,248,0.18); border-color: #38bdf8; }
  .save-btn.dirty { background: rgba(56,189,248,0.22); box-shadow: 0 0 0 1px rgba(56,189,248,.4), 0 0 12px rgba(56,189,248,.25); }
  .icon-btn {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; border-radius: 7px; cursor: pointer; transition: all .2s ease; flex-shrink: 0;
  }
  .icon-btn:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,.35); color: #fca5a5; }

  .warning-strip {
    display: flex; align-items: center; gap: 8px; padding: 7px 18px;
    background: rgba(251,146,60,0.06); border-bottom: 1px solid rgba(251,146,60,0.15);
    font-size: 11px; color: #fdba8c; flex-shrink: 0;
  }
  .warning-strip svg { flex-shrink: 0; color: #fb923c; }
  .warning-strip strong { color: #fed7aa; }

  .editors { flex: 1; display: flex; min-height: 0; }
  .editor-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .editor-pane + .editor-pane { border-left: 1px solid rgba(255,255,255,0.06); }
  .editor-host { flex: 1; min-height: 0; }
  .editor-host .CodeMirror { height: 100%; font-size: 12.5px; }

  .editor-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; background: #10131d; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .lang-chip { font-size: 10.5px; font-weight: 700; color: #78c8ff; letter-spacing: .4px; }
  .runat-select {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    color: #94a3b8; border-radius: 6px; padding: 3px 6px; font-size: 10.5px; font-family: inherit;
    cursor: pointer; outline: none;
  }

  .no-selection {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #64748b; font-size: 13px; text-align: center; gap: 10px; padding: 20px;
  }
  .no-selection svg { color: #334155; }
  .no-selection strong { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">
          <svg class="logo-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7a2 2 0 0 0-2.45-1.45L16 7V5a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2l4.55 1.45A2 2 0 0 0 23 17V7z"/></svg>
          <span id="ruleCount">Rules (0)</span>
        </div>
        <button class="new-rule-link" id="addRuleBtn">+ New rule</button>
      </div>
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="Find…">
      </div>
      <div class="rule-list" id="ruleList"></div>
    </div>

    <div class="main">
      <div class="warning-strip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span><strong>JS runs with full page privileges.</strong> Only paste code you trust. Changes apply next time a matching page loads.</span>
      </div>

      <div id="noSelection" class="no-selection">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <div><strong>No rule selected</strong><br>Pick a rule on the left, or create a new one.</div>
      </div>

      <div id="editorArea" style="display:none; flex-direction:column; flex:1; min-height:0;">
        <div class="topbar">
          <div class="field-group name">
            <div class="field-label">Rule name</div>
            <input type="text" class="field-input" id="nameInput" placeholder="ex. My new rule">
          </div>
          <div class="field-group pattern">
            <div class="field-label">URL pattern</div>
            <div class="pattern-row">
              <svg class="pattern-check" id="patternCheck" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
              <input type="text" class="field-input" id="patternInput" placeholder="https://site.com/*, !https://site.com/excluded/*">
            </div>
          </div>
          <div class="topbar-actions">
            <button class="save-btn" id="saveBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save
            </button>
            <button class="icon-btn" id="deleteBtn" title="Delete rule">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>

        <div class="editors">
          <div class="editor-pane">
            <div class="editor-host" id="jsHost"></div>
            <div class="editor-footer">
              <span class="lang-chip">JAVASCRIPT</span>
              <select class="runat-select" id="runAtSelect">
                <option value="start">Run: as soon as possible</option>
                <option value="idle">Run: after page loads</option>
              </select>
            </div>
          </div>
          <div class="editor-pane">
            <div class="editor-host" id="cssHost"></div>
            <div class="editor-footer">
              <span class="lang-chip">CSS</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/codemirror/codemirror.js"></script>
  <script src="vendor/codemirror/mode/javascript/javascript.js"></script>
  <script src="vendor/codemirror/mode/css/css.js"></script>
  <script src="vendor/codemirror/addon/edit/matchbrackets.js"></script>
  <script src="vendor/codemirror/addon/edit/closebrackets.js"></script>
  <script src="vendor/codemirror/addon/selection/active-line.js"></script>
  <script type="module" src="src/rules/RulesController.js"></script>
</body>
</html>
